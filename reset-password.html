<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Authenticator</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-card-header">
                    <h1 class="auth-card-title">Reset Password</h1>
                    <p class="auth-card-subtitle">Create a new password for your account</p>
                </div>

                <div id="alert-container"></div>

                <form class="auth-form" id="resetForm" novalidate>
                    <div class="form-group">
                        <label for="newpassword" class="form-label">New Password</label>
                        <div class="password-toggle-wrapper">
                            <input 
                                type="password" 
                                class="form-control" 
                                id="newpassword" 
                                name="newpassword" 
                                placeholder="••••••••"
                                required>
                            <button 
                                type="button" 
                                class="password-toggle-btn" 
                                onclick="togglePasswordVisibility('newpassword', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <small class="form-text text-muted">At least 8 characters with uppercase, lowercase, and numbers</small>
                        <small class="form-text text-danger d-none" id="newpasswordError"></small>
                    </div>

                    <div class="form-group">
                        <label for="confirmpassword" class="form-label">Confirm Password</label>
                        <div class="password-toggle-wrapper">
                            <input 
                                type="password" 
                                class="form-control" 
                                id="confirmpassword" 
                                name="confirmpassword" 
                                placeholder="••••••••"
                                required>
                            <button 
                                type="button" 
                                class="password-toggle-btn" 
                                onclick="togglePasswordVisibility('confirmpassword', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <small class="form-text text-danger d-none" id="confirmpasswordError"></small>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        <i class="bi bi-check-circle"></i> Update Password
                    </button>
                </form>

                <div class="link-group">
                    <div class="link-item">
                        <a href="login.html" class="btn-link">
                            <i class="bi bi-arrow-left"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const form = document.getElementById('resetForm');
        const newPasswordInput = document.getElementById('newpassword');
        const confirmPasswordInput = document.getElementById('confirmpassword');
        const alertContainer = document.getElementById('alert-container');

        // Show alert
        function showAlert(message, type = 'danger') {
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-circle"></i> ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
        }

        // Clear alerts
        function clearAlerts() {
            alertContainer.innerHTML = '';
        }

        // Toggle password visibility
        function togglePasswordVisibility(fieldId, button) {
            const field = document.getElementById(fieldId);
            const icon = button.querySelector('i');
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        // Validate new password
        function validateNewPassword() {
            clearAlerts();
            const password = newPasswordInput.value;
            const passwordError = document.getElementById('newpasswordError');

            if (!password) {
                passwordError.textContent = 'New password is required';
                passwordError.classList.remove('d-none');
                newPasswordInput.classList.add('is-invalid');
                return false;
            }

            if (password.length < 8) {
                passwordError.textContent = 'Password must be at least 8 characters';
                passwordError.classList.remove('d-none');
                newPasswordInput.classList.add('is-invalid');
                return false;
            }

            if (!/[A-Z]/.test(password)) {
                passwordError.textContent = 'Password must contain at least one uppercase letter';
                passwordError.classList.remove('d-none');
                newPasswordInput.classList.add('is-invalid');
                return false;
            }

            if (!/[a-z]/.test(password)) {
                passwordError.textContent = 'Password must contain at least one lowercase letter';
                passwordError.classList.remove('d-none');
                newPasswordInput.classList.add('is-invalid');
                return false;
            }

            if (!/\d/.test(password)) {
                passwordError.textContent = 'Password must contain at least one number';
                passwordError.classList.remove('d-none');
                newPasswordInput.classList.add('is-invalid');
                return false;
            }

            newPasswordInput.classList.remove('is-invalid');
            passwordError.classList.add('d-none');
            return true;
        }

        // Validate confirm password
        function validateConfirmPassword() {
            clearAlerts();
            const password = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const confirmError = document.getElementById('confirmpasswordError');

            if (!confirmPassword) {
                confirmError.textContent = 'Please confirm your password';
                confirmError.classList.remove('d-none');
                confirmPasswordInput.classList.add('is-invalid');
                return false;
            }

            if (password !== confirmPassword) {
                confirmError.textContent = 'Passwords do not match';
                confirmError.classList.remove('d-none');
                confirmPasswordInput.classList.add('is-invalid');
                return false;
            }

            confirmPasswordInput.classList.remove('is-invalid');
            confirmError.classList.add('d-none');
            return true;
        }

        // Real-time validation
        newPasswordInput.addEventListener('blur', validateNewPassword);
        confirmPasswordInput.addEventListener('blur', validateConfirmPassword);

        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const isNewPasswordValid = validateNewPassword();
            const isConfirmPasswordValid = validateConfirmPassword();

            if (isNewPasswordValid && isConfirmPasswordValid) {
                const newPassword = newPasswordInput.value;
                const resetEmail = localStorage.getItem('resetEmail');

                // Update user data with new password
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                userData.password = newPassword;
                userData.passwordResetAt = new Date().toISOString();
                localStorage.setItem('userData', JSON.stringify(userData));

                // Clear reset data
                localStorage.removeItem('resetEmail');
                localStorage.removeItem('resetRequested');

                showAlert('✓ Password updated successfully! Redirecting to login...', 'success');
                
                // Redirect after 1.5 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
