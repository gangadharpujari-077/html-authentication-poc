<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Authenticator</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-card-header">
                    <h1 class="auth-card-title">Forgot Password?</h1>
                    <p class="auth-card-subtitle">Enter your email to reset your password</p>
                </div>

                <div id="alert-container"></div>

                <form class="auth-form" id="forgotForm" novalidate>
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email" 
                            placeholder="you@example.com"
                            required>
                        <small class="form-text text-muted">We'll send you a link to reset your password</small>
                        <small class="form-text text-danger d-none" id="emailError"></small>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        <i class="bi bi-arrow-right"></i> Send Reset Link
                    </button>
                </form>

                <div class="link-group">
                    <div class="link-item">
                        <a href="login.html" class="btn-link">
                            <i class="bi bi-arrow-left"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const form = document.getElementById('forgotForm');
        const emailInput = document.getElementById('email');
        const alertContainer = document.getElementById('alert-container');

        // Email validation regex
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // Show alert
        function showAlert(message, type = 'danger') {
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-circle"></i> ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
        }

        // Clear alerts
        function clearAlerts() {
            alertContainer.innerHTML = '';
        }

        // Validate email
        function validateEmail() {
            clearAlerts();
            const email = emailInput.value.trim();
            const emailError = document.getElementById('emailError');

            if (!email) {
                emailError.textContent = 'Email is required';
                emailError.classList.remove('d-none');
                emailInput.classList.add('is-invalid');
                return false;
            }

            if (!emailRegex.test(email)) {
                emailError.textContent = 'Please enter a valid email address';
                emailError.classList.remove('d-none');
                emailInput.classList.add('is-invalid');
                return false;
            }

            emailInput.classList.remove('is-invalid');
            emailError.classList.add('d-none');
            return true;
        }

        // Real-time validation
        emailInput.addEventListener('blur', validateEmail);

        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            if (validateEmail()) {
                const email = emailInput.value.trim();

                // Store reset request
                localStorage.setItem('resetEmail', email);
                localStorage.setItem('resetRequested', new Date().toISOString());

                showAlert('✓ Reset link sent! Check your email. Redirecting to password reset...', 'success');
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'reset-password.html';
                }, 2000);
            }
        });
    </script>
</body>
</html>
